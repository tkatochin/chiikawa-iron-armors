<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ちいかわ アイアンアーマーズ</title>
  <meta name="description" content="ちいかわ アイアンアーマーズの原稿ビューア">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --paper: #ffffff;
      --paper-deep: #f6f8fa;
      --ink: #24292f;
      --muted: #57606a;
      --line: #d0d7de;
      --accent: #0969da;
      --accent-deep: #0550ae;
      --nav: #24292f;
      --gold: #8250df;
      --shadow: none;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: auto;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper-deep);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      line-height: 1.7;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .reading-context {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
      width: 100%;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 1px 3px rgba(31, 35, 40, 0.08);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      opacity: 0;
      transform: translateY(-100%);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      backdrop-filter: blur(14px);
    }

    .reading-context.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .reading-context-inner {
      width: min(1360px, calc(100% - 40px));
      margin: 0 auto;
      padding: 8px 0 7px;
    }

    .reading-context a {
      display: block;
      overflow: hidden;
      color: var(--nav);
      text-decoration: none;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .reading-context-title {
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .reading-context-section {
      display: none;
      margin-top: 2px;
      padding-top: 4px;
      border-top: 1px solid rgba(217, 205, 188, 0.72);
      color: var(--accent-deep);
      font-size: 0.76rem;
      line-height: 1.45;
    }

    .reading-context.has-section .reading-context-section {
      display: block;
    }

    .site-shell {
      display: grid;
      grid-template-columns: minmax(200px, 260px) minmax(0, 920px);
      justify-content: center;
      gap: 24px;
      width: min(1220px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    .sidebar {
      position: sticky;
      top: 24px;
      align-self: start;
      max-height: calc(100vh - 48px);
      padding: 18px 16px;
      overflow: auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .brand {
      display: grid;
      gap: 6px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand-kicker {
      color: var(--accent-deep);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .brand-title {
      margin: 0;
      color: var(--nav);
      font-size: clamp(1.18rem, 2.2vw, 1.55rem);
      line-height: 1.35;
    }

    .brand-note {
      margin: 0;
      color: var(--muted);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-size: 0.82rem;
      line-height: 1.7;
    }

    .doc-switch {
      display: grid;
      gap: 8px;
      margin-top: 16px;
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-size: 0.82rem;
    }

    .doc-switch a {
      display: block;
      padding: 7px 9px;
      border: 1px solid rgba(23, 60, 67, 0.14);
      border-radius: 6px;
      color: var(--nav);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.42);
    }

    .doc-switch a[aria-current="page"] {
      border-color: rgba(185, 65, 50, 0.34);
      background: rgba(185, 65, 50, 0.1);
      color: var(--accent-deep);
      font-weight: 700;
    }

    .toc-title {
      margin: 18px 0 10px;
      color: var(--accent-deep);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .toc-list {
      display: grid;
      gap: 4px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .toc-list a {
      display: block;
      padding: 6px 8px;
      border-radius: 6px;
      color: var(--nav);
      text-decoration: none;
    }

    .toc-list a:hover,
    .toc-list a:focus-visible {
      background: rgba(23, 60, 67, 0.09);
      outline: none;
    }

    .toc-list .level-3 a {
      padding-left: 20px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .content-toc {
      display: none;
      margin: 0 0 46px;
      border: 1px solid rgba(127, 43, 36, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.32);
    }

    .content-toc summary {
      cursor: pointer;
      padding: 14px 16px;
      color: var(--accent-deep);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-weight: 700;
    }

    .content-toc .toc-list {
      display: block;
      columns: 2 220px;
      column-gap: 24px;
      padding: 0 16px 16px;
    }

    .content-toc .toc-list li {
      break-inside: avoid;
      margin-bottom: 4px;
    }

    .reader {
      min-width: 0;
    }

    article {
      padding: clamp(28px, 4vw, 48px);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: var(--shadow);
    }

    .loading,
    .error {
      margin: 0;
      color: var(--muted);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    }

    article h1,
    article h2,
    article h3 {
      position: relative;
      color: var(--ink);
      line-height: 1.38;
      scroll-margin-top: 88px;
    }

    article h1 {
      margin: 0 0 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
      color: var(--nav);
      font-size: clamp(1.8rem, 4vw, 2.25rem);
      line-height: 1.3;
    }

    article h2 {
      margin: 40px 0 16px;
      padding: 0;
      border: 0;
      color: var(--nav);
      font-size: clamp(1.3rem, 2.5vw, 1.6rem);
    }

    article h3 {
      margin: 28px 0 10px;
      color: var(--nav);
      font-size: clamp(1.08rem, 2vw, 1.25rem);
    }

    article p,
    article li {
      font-size: 1rem;
    }

    article p {
      margin: 0 0 0.8em;
    }

    article ul,
    article ol {
      padding-left: 1.5em;
    }

    article li + li {
      margin-top: 0.35em;
    }

    article strong {
      color: inherit;
    }

    article code {
      padding: 0.12em 0.36em;
      border: 1px solid rgba(127, 43, 36, 0.14);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--accent-deep);
      font-family: "SFMono-Regular", "Menlo", monospace;
      font-size: 0.92em;
    }

    article blockquote {
      margin: 20px 0;
      padding: 0 16px;
      border-left: 4px solid var(--line);
      background: transparent;
      color: var(--muted);
    }

    article img {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      margin: 24px auto 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: none;
    }

    article figure {
      margin: 24px 0 28px;
      text-align: center;
    }

    article figure img {
      margin: 0 auto 6px;
    }

    article figcaption {
      color: var(--muted);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    article figure.book-cover {
      margin: 0 0 28px;
    }

    article figure.book-cover img {
      width: min(100%, 820px);
      margin: 0 auto;
    }

    article hr {
      height: 1px;
      margin: 32px 0;
      border: 0;
      background: var(--line);
    }

    .scene-break {
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 32px auto;
      color: var(--muted);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.18em;
    }

    .scene-break::before,
    .scene-break::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }

    .top-link {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 250, 240, 0.6);
      border-radius: 999px;
      background: var(--nav);
      color: #fffaf0;
      box-shadow: 0 12px 26px rgba(23, 60, 67, 0.28);
      text-decoration: none;
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .reading-context-inner {
        width: min(100% - 24px, 860px);
      }

      .site-shell {
        display: block;
        width: min(100% - 24px, 860px);
        padding-top: 14px;
      }

      .sidebar {
        display: none;
      }

      .content-toc {
        display: block;
      }

      article {
        padding: 24px clamp(16px, 5vw, 32px) 42px;
      }

      article h1 {
        margin-bottom: 24px;
      }

      article h2 {
        margin-top: 48px;
      }
    }

    @media (max-width: 560px) {
      .content-toc .toc-list {
        columns: 1;
      }
    }
  </style>
</head>
<body>
  <div class="reading-context" id="reading-context" aria-label="現在位置">
    <div class="reading-context-inner">
      <a class="reading-context-title" id="reading-context-title" href="#top"></a>
      <a class="reading-context-section" id="reading-context-section" href="#top"></a>
    </div>
  </div>
  <div class="site-shell" id="top">
    <aside class="sidebar" aria-label="目次">
      <div class="brand">
        <p class="brand-kicker">CHIIKAWA IRON ARMORS</p>
        <h1 class="brand-title" id="brand-title">原稿ビューア</h1>
        <p class="brand-note" id="brand-note">Markdownと挿絵画像をそのまま読み込むビューア。</p>
        <nav class="doc-switch" aria-label="表示する文書">
          <a href="?doc=plot" data-doc-link="plot">原稿プロット</a>
          <a href="?doc=outline" data-doc-link="outline">章立て</a>
          <a href="?doc=novel" data-doc-link="novel">小説版本文</a>
        </nav>
      </div>
      <p class="toc-title">目次</p>
      <nav id="toc" class="toc-list" aria-label="目次"></nav>
    </aside>

    <main class="reader">
      <article id="content" aria-live="polite">
        <p class="loading">原稿を読み込み中です。</p>
      </article>
    </main>
  </div>
  <a class="top-link" href="#top" aria-label="ページ上部へ戻る">↑</a>

  <script>
    const documents = {
      plot: {
        path: './映画ストーリー原稿プロット.md',
        label: '映画ストーリー原稿プロット',
        note: '脚本化のための内部プロット。ネタバレを含みます。',
        loading: '原稿プロットを読み込み中です。'
      },
      outline: {
        path: './小説版_章立て.md',
        label: '小説版 章立て',
        note: '章ごとの流れと今後の展開を整理した設計メモです。',
        loading: '章立てを読み込み中です。'
      },
      novel: {
        path: './小説版_本文.md',
        label: '小説版本文',
        note: '章ファイルから生成した読書用の結合版です。',
        loading: '小説版本文を読み込み中です。'
      }
    };

    const params = new URLSearchParams(window.location.search);
    const requestedDoc = params.get('doc') || 'novel';
    const currentDocKey = documents[requestedDoc] ? requestedDoc : 'novel';
    const currentDoc = documents[currentDocKey];
    const markdownPath = currentDoc.path;
    const content = document.getElementById('content');
    const toc = document.getElementById('toc');
    const brandTitle = document.getElementById('brand-title');
    const brandNote = document.getElementById('brand-note');
    const readingContext = document.getElementById('reading-context');
    const readingContextTitle = document.getElementById('reading-context-title');
    const readingContextSection = document.getElementById('reading-context-section');

    const slugCounts = new Map();

    function slugify(text) {
      const base = text
        .trim()
        .toLowerCase()
        .replace(/[\s　]+/g, '-')
        .replace(/["'`!?.,:;()\[\]{}<>]/g, '')
        .replace(/-+/g, '-') || 'section';
      const count = slugCounts.get(base) || 0;
      slugCounts.set(base, count + 1);
      return count ? `${base}-${count + 1}` : base;
    }

    function buildToc() {
      const headings = [...content.querySelectorAll('h2, h3')];
      const list = document.createElement('ul');
      list.className = 'toc-list';

      headings.forEach((heading) => {
        const item = document.createElement('li');
        item.className = heading.tagName === 'H2' ? 'level-2' : 'level-3';
        const headingText = heading.textContent;
        heading.dataset.headingText = headingText;

        const link = document.createElement('a');
        link.href = `#${heading.id}`;
        link.textContent = headingText;
        item.appendChild(link);
        list.appendChild(item);
      });

      const sidebarList = list.cloneNode(true);
      const contentList = list.cloneNode(true);

      toc.replaceChildren(...sidebarList.childNodes);

      const contentToc = document.createElement('details');
      contentToc.className = 'content-toc';
      contentToc.open = true;

      const summary = document.createElement('summary');
      summary.textContent = '目次';

      const contentTocNav = document.createElement('nav');
      contentTocNav.setAttribute('aria-label', '本文目次');
      contentTocNav.appendChild(contentList);

      contentToc.appendChild(summary);
      contentToc.appendChild(contentTocNav);

      content.querySelector('h1')?.after(contentToc);
    }

    function configureMarked() {
      const renderer = new marked.Renderer();
      renderer.heading = ({ tokens, depth }) => {
        const text = marked.parser(tokens);
        const plainText = tokens.map((token) => token.raw || token.text || '').join('');
        const id = slugify(plainText);
        return `<h${depth} id="${id}">${text}</h${depth}>`;
      };

      marked.setOptions({
        renderer,
        gfm: true,
        breaks: false,
        mangle: false,
        headerIds: false
      });
    }

    function prepareMarkdown(markdown) {
      return markdown.replace(
        /^＊$/gm,
        '<div class="scene-break" aria-hidden="true">＊</div>'
      );
    }

    function updateDocumentChrome() {
      brandTitle.textContent = currentDoc.label;
      brandNote.textContent = currentDoc.note;
      content.innerHTML = `<p class="loading">${currentDoc.loading}</p>`;

      document.querySelectorAll('[data-doc-link]').forEach((link) => {
        if (link.dataset.docLink === currentDocKey) {
          link.setAttribute('aria-current', 'page');
        } else {
          link.removeAttribute('aria-current');
        }
      });
    }

    function moveBookCoverAboveTitle() {
      const title = content.querySelector('h1');
      const cover = content.querySelector('figure.book-cover');

      if (title && cover) {
        content.insertBefore(cover, title);
      }
    }

    function setupReadingContext() {
      const title = content.querySelector('h1');
      const sectionHeadings = [...content.querySelectorAll('h2, h3')];

      if (!title) {
        return;
      }

      readingContextTitle.textContent = title.textContent;
      readingContextTitle.href = `#${title.id}`;

      let ticking = false;

      function updateReadingContext() {
        ticking = false;

        const titleHasScrolledAway = title.getBoundingClientRect().bottom <= 0;
        readingContext.classList.toggle('is-visible', titleHasScrolledAway);

        let activeHeading = null;
        const activationOffset = 96;

        sectionHeadings.forEach((heading) => {
          if (heading.getBoundingClientRect().top <= activationOffset) {
            activeHeading = heading;
          }
        });

        if (titleHasScrolledAway && activeHeading) {
          readingContextSection.textContent = activeHeading.dataset.headingText || activeHeading.textContent;
          readingContextSection.href = `#${activeHeading.id}`;
          readingContext.classList.add('has-section');
        } else {
          readingContextSection.removeAttribute('href');
          readingContext.classList.remove('has-section');
        }
      }

      function requestReadingContextUpdate() {
        if (!ticking) {
          ticking = true;
          window.requestAnimationFrame(updateReadingContext);
        }
      }

      window.addEventListener('scroll', requestReadingContextUpdate, { passive: true });
      window.addEventListener('resize', requestReadingContextUpdate);
      updateReadingContext();
    }

    async function renderMarkdown() {
      updateDocumentChrome();
      configureMarked();

      try {
        const response = await fetch(`${markdownPath}?v=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const markdown = await response.text();
        content.innerHTML = marked.parse(prepareMarkdown(markdown));
        moveBookCoverAboveTitle();
        buildToc();
        setupReadingContext();
        document.title = `${content.querySelector('h1')?.textContent || currentDoc.label} | ちいかわ アイアンアーマーズ`;
      } catch (error) {
        content.innerHTML = `
          <h1>Markdownを読み込めませんでした</h1>
          <p class="error">公開サーバー上ではこのまま動作します。ローカルで確認する場合は、このフォルダを簡易サーバーで開いてください。</p>
          <p class="error">対象ファイル: <code>${markdownPath}</code></p>
        `;
        console.error(error);
      }
    }

    renderMarkdown();
  </script>
</body>
</html>
